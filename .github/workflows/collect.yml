name: 도서관 열람실 수집

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "실행 모드 (비워두면 일반 수집, test-alert 입력 시 알림 테스트)"
        required: false
        default: ""

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 데이터 수집
        env:
          LIBRARY_API_KEY:      ${{ secrets.LIBRARY_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:         ${{ secrets.SUPABASE_KEY }}
          KAKAO_REST_KEY:        ${{ secrets.KAKAO_REST_KEY }}
          KAKAO_REFRESH_TOKEN:   ${{ secrets.KAKAO_REFRESH_TOKEN }}
          KAKAO_CLIENT_SECRET:   ${{ secrets.KAKAO_CLIENT_SECRET }}
          ALERT_ENABLED:         ${{ vars.ALERT_ENABLED }}
        run: |
          if [ "${{ github.event.inputs.mode }}" = "test-alert" ]; then
            python fetch.py --test-alert
          else
            python fetch.py
          fi
